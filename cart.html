<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق - متجري الإلكتروني</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">🛍️ متجري</a>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="products.html">المنتجات</a></li>
                <li><a href="cart.html" class="active">سلة التسوق (<span id="cart-count">0</span>)</a></li>
            </ul>
            <div class="hamburger">☰</div>
        </div>
    </nav>

    <main class="cart-page">
        <h2>سلة التسوق</h2>
        <div id="cart-items"></div>
        <div id="cart-empty" style="display: none;">
            <p>السلة فارغة</p>
            <a href="products.html" class="cta-button">تصفح المنتجات</a>
        </div>
        <div id="cart-summary" style="display: none;">
            <div class="coupon-section">
                <input type="text" id="coupon-input" placeholder="كود الخصم">
                <button onclick="applyCoupon()">تطبيق</button>
            </div>
            <div class="totals">
                <p>المجموع الفرعي: <span id="subtotal">0</span> ريال</p>
                <p>الخصم: <span id="discount">0</span> ريال</p>
                <p>الشحن: <span id="shipping">30</span> ريال</p>
                <h3>الإجمالي: <span id="total">0</span> ريال</h3>
            </div>
            <button onclick="checkout()" class="checkout-btn">إتمام الشراء</button>
        </div>
    </main>

    <footer>
        <p>© 2024 متجري الإلكتروني. جميع الحقوق محفوظة</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
