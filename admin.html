<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - FibNo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar admin-nav">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon">👑</span>
                <span class="logo-text">FibNo تحكم</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">الموقع</a></li>
            </ul>
        </div>
    </nav>

    <main class="admin-page">
        <!-- تسجيل الدخول -->
        <div id="login-section">
            <div class="login-card">
                <h2>🔐 تسجيل الدخول</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" id="admin-password" required placeholder="••••••">
                    </div>
                    <button type="submit" class="cta-button">دخول</button>
                </form>
            </div>
        </div>

        <!-- لوحة التحكم -->
        <div id="dashboard-section" style="display:none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-icon">📋</span>
                    <div class="stat-info">
                        <h3 id="total-orders">0</h3>
                        <p>الطلبات</p>
                    </div>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">💰</span>
                    <div class="stat-info">
                        <h3 id="total-revenue">0 دج</h3>
                        <p>الإجمالي</p>
                    </div>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">📢</span>
                    <div class="stat-info">
                        <h3 id="total-posts">0</h3>
                        <p>منشورات</p>
                    </div>
                </div>
            </div>

            <div class="admin-tabs">
                <button class="tab-btn active" onclick="switchTab('orders')">📋 الطلبات</button>
                <button class="tab-btn" onclick="switchTab('posts')">📢 المنشورات</button>
                <button class="tab-btn" onclick="switchTab('settings')">⚙️ الإعدادات</button>
            </div>

            <!-- الطلبات -->
            <div id="orders-tab" class="tab-content active">
                <h3>طلبات الوساطة</h3>
                <div id="admin-orders-list"></div>
            </div>

            <!-- المنشورات -->
            <div id="posts-tab" class="tab-content">
                <div class="tab-header">
                    <h3>إدارة المنشورات</h3>
                    <button class="cta-button" onclick="showAddPost()">+ منشور جديد</button>
                </div>
                <div id="admin-posts-list"></div>
            </div>

            <!-- الإعدادات -->
            <div id="settings-tab" class="tab-content">
                <h3>⚙️ الإعدادات</h3>
                <form id="settings-form" class="settings-form">
                    <div class="form-group">
                        <label>رقم الواتساب (مع مفتاح 213)</label>
                        <input type="text" id="whatsapp-number" dir="ltr">
                    </div>
                    <button type="submit" class="cta-button">حفظ</button>
                </form>
            </div>
        </div>
    </main>

    <!-- نافذة منشور -->
    <div id="post-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePostModal()">&times;</span>
            <h2 id="post-modal-title">منشور جديد</h2>
            <form id="post-form">
                <input type="hidden" id="post-id">
                <div class="form-group">
                    <label>العنوان</label>
                    <input type="text" id="post-title" required>
                </div>
                <div class="form-group">
                    <label>المحتوى</label>
                    <textarea id="post-content" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label>رابط (اختياري)</label>
                    <input type="url" id="post-link" placeholder="https://..." dir="ltr">
                </div>
                <div class="form-group">
                    <label>لون الخلفية</label>
                    <select id="post-color">
                        <option value="#667eea">أزرق</option>
                        <option value="#00b894">أخضر</option>
                        <option value="#e94560">أحمر</option>
                        <option value="#fdcb6e">أصفر</option>
                        <option value="#6c5ce7">بنفسجي</option>
                    </select>
                </div>
                <button type="submit" class="cta-button">حفظ</button>
                <button type="button" class="secondary-button" onclick="closePostModal()">إلغاء</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
